<svg xmlns="http://www.w3.org/2000/svg" width="460" height="132" viewBox="0 0 460 132" fill="none" role="img" aria-label="Allem">
  <defs>
    <linearGradient id="allemGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Dark badge -->
  <rect x="16" y="18" width="96" height="96" rx="24" fill="#0B1220" stroke="#16A34A" stroke-opacity="0.45" stroke-width="2"/>

  <!-- Clean magnifying glass -->
