    <line x1="76" y1="76" x2="98" y2="98"/>
  </g>

  <!-- Wordmark -->
  <text x="132" y="74" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5" fill="url(#allemGreen)">allem</text>
  <!-- Tagline -->
  <text x="134" y="100" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="0.2" fill="#7D8FA3">codebase &amp; dependency intelligence</text>
</svg>
